[agents.request_translator]
description = "Translate ambiguous or multi-topic requests into structured pre-implementation tasks."
config_file = ".codex/agents/request-translator.toml"

[agents.pre_implementation_diagnosis]
description = "Compare realistic implementation approaches before coding when UI, architecture, or cross-layer design choices matter."
config_file = ".codex/agents/tech-diagnostician.toml"

[agents.code_mapper]
description = "Map entry points, owning files, branch points, and side-effect boundaries before changes."
config_file = ".codex/agents/code-mapper.toml"

[agents.plan_reviewer]
description = "Review a remake or refactor plan before implementation and find risks, missing conditions, and over-broad scope."
config_file = ".codex/agents/plan-reviewer.toml"

[agents.ui_fixer]
description = "Organize the smallest safe patch strategy for a reproduced UI issue without broadening scope."
config_file = ".codex/agents/ui-fixer.toml"

[agents.documentation_engineer]
description = "Align documentation updates with real code paths, workflows, assumptions, and recovery steps."
config_file = ".codex/agents/documentation-engineer.toml"

[agents.subagent_debug_review]
description = "Investigate complex bugs and strict reviews, splitting work into bounded investigation tracks when justified."
config_file = ".codex/agents/subagent-debug-review.toml"

[agents.ui_auditor]
description = "Audit existing UI for findability, information structure, visual priority, safety, and error display issues."
config_file = ".codex/agents/ui-auditor.toml"

[agents.implementation_planner]
description = "Organize change targets, impact scope, data effects, rollback plans, and implementation order before coding."
config_file = ".codex/agents/implementation-planner.toml"

[agents.docs_curator]
description = "Audit role separation across AGENTS.md, skills, docs, and project AGENTS to find duplicates and misplacements."
config_file = ".codex/agents/docs-curator.toml"

# [agents.python_web_electron_shell_migrator] — 削除済み (skill-inventory 棚卸し判定: 極めて限定的なため削除、知見は pre-implementation-diagnosis へ吸収)


[agents.windows_python_gui_repo_triage]
description = "Triage a Windows-first multi-tool workspace into real apps, entry points, dependencies, and early risks."
config_file = ".codex/agents/windows-python-gui-repo-triage.toml"

[agents.legacy_app_remake_planner]
description = "Plan a safe remake of an existing app while preserving current behavior and operational safety."
config_file = ".codex/agents/legacy-app-remake-planner.toml"

[agents.pixiv_tool_workspace_maintainer]
description = "Maintain Pixiv-related local tools while protecting local state, presets, and posting workflows."
config_file = ".codex/agents/pixiv-tool-workspace-maintainer.toml"

[agents.post_manager_maintainer]
description = "Maintain the Post Manager project safely across CLI, Web UI, automation, CSV data, and browser profiles."
config_file = ".codex/agents/post-manager-maintainer.toml"

[agents.workspace_delegation_orchestrator]
description = "Coordinate subagents safely when the user explicitly permits delegation, parallel work, or split execution."
config_file = ".codex/agents/workspace-delegation-orchestrator.toml"
