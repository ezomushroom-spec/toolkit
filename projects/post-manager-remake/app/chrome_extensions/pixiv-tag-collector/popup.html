<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>Pixiv Tag Collector</title>
    <style>
      body {
        font-family: "Yu Gothic UI", sans-serif;
        margin: 12px;
        width: 320px;
        color: #222;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 10px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin: 10px 0 4px;
      }

      input,
      select,
      button,
      textarea {
        box-sizing: border-box;
        width: 100%;
        font: inherit;
      }

      input,
      select {
        padding: 7px 8px;
      }

      button {
        margin-top: 12px;
        padding: 9px 10px;
        border: 0;
        background: #3f63d8;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: #555;
        line-height: 1.5;
      }

      .status {
        margin-top: 12px;
        padding: 8px;
        background: #f3f5fb;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Pixiv Tag Collector</h1>
    <label for="sourceKey">source_key</label>
    <input id="sourceKey" type="text" placeholder="r18-search-page-1">

    <label for="maxItems">取得件数</label>
    <select id="maxItems">
      <option value="5">5件</option>
      <option value="10" selected>10件</option>
      <option value="20">20件</option>
    </select>

    <label for="delayMs">待機時間(ms)</label>
    <select id="delayMs">
      <option value="1200">1200</option>
      <option value="1800" selected>1800</option>
      <option value="2500">2500</option>
    </select>

    <button id="collectButton">一覧から作品タグを収集</button>

    <div class="hint">
      Pixiv 一覧ページで開いてください。いま見えている作品リンクから上位件数だけ取得し、最後に JSON をダウンロードします。
    </div>

    <div id="status" class="status">待機中</div>

    <script src="popup.js"></script>
  </body>
</html>
